openapi: 3.1.0
info:
  title: Observability Bridge
  version: 1.1.0
servers:
  - url: http://127.0.0.1:7171
paths:
  /api/health:
    get:
      summary: Bridge health
      responses:
        '200': { description: OK }
  /api/telemetry-info:
    get:
      summary: Contract and telemetry info
      responses:
        '200': { description: OK }
  /api/projects:
    get:
      summary: List projects with rollups
      responses:
        '200': { description: OK }
  /api/projects/{id}/status:
    get:
      summary: Project observation lines (NDJSON tail via server)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/projects/{id}/health:
    get:
      summary: Project rollup health
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: ./schema/obs.health.v1.json
  /api/projects/{id}/manifest:
    get:
      summary: Validate and fetch project manifest
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: ./schema/obs.manifest.result.v1.json
        '404': { description: Not found }
  /api/projects/{id}/integration:
    get:
      summary: Project integration view (observers, health, services)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: ./schema/obs.integration.v1.json
        '404': { description: Not found }
  /api/discovery/services:
    get:
      summary: Service discovery (DS/MCP registry)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: ./schema/service.discovery.v1.json
  /api/discovery/schemas:
    get:
      summary: List loaded schemas, names, and IDs
      responses:
        '200': { description: OK }
  /api/schemas/{name}:
    get:
      summary: Serve schema by filename
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/tools/project_obs_run:
    post:
      summary: Run observer(s)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [project_id]
              properties:
                project_id: { type: string }
                observer:
                  type: string
                  enum: [git, mise, sbom, build, manifest]
                observers:
                  type: array
                  items:
                    type: string
                    enum: [git, mise, sbom, build, manifest]
      responses:
        '200': { description: OK }
  /api/tools/obs_validate:
    post:
      summary: Validate observation coverage
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: ./schema/obs.validate.result.v1.json
              examples:
                sample:
                  value:
                    ok: true
                    telemetry: { reachable: true }
                    registry: { path: "/Users/me/.local/share/devops-mcp/project-registry.json", exists: true }
                    dirs: ["/Users/me/.local/share/devops-mcp/observations","/Users/me/Library/Application Support/devops.mcp/observations"]
                    projects_total: 41
                    projects_with_observations: 12
                    projects_without_observations: 29
  /api/tools/obs_migrate:
    post:
      summary: Migrate per-observer files into observations.ndjson
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                project_id: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: ./schema/obs.migrate.result.v1.json
              examples:
                all:
                  value:
                    ok: true
                    results:
                      - { id: "github:org/projectA", migrated: 23 }
                      - { id: "github:org/projectB", migrated: 0 }
  /api/events/stream:
    get:
      summary: Server-sent events for ProjectObsCompleted and SLOBreach
      responses:
        '200': { description: event-stream }
  /.well-known/obs-bridge.json:
    get:
      summary: Well-known descriptor for bridge contracts
      responses:
        '200': { description: OK }
components:
  schemas:
    ObserverLine:
      $ref: ./schema/obs.line.v1.json
    ProjectHealthSummary:
      $ref: ./schema/obs.health.v1.json
    SLOBreachEvent:
      $ref: ./schema/obs.slobreach.v1.json
    ProjectManifestValidationResult:
      $ref: ./schema/obs.manifest.result.v1.json
    ProjectIntegration:
      $ref: ./schema/obs.integration.v1.json
    ServiceDiscovery:
      $ref: ./schema/service.discovery.v1.json
    ObsValidateResult:
      $ref: ./schema/obs.validate.result.v1.json
    ObsMigrateResult:
      $ref: ./schema/obs.migrate.result.v1.json
