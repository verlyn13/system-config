# Example Project Manifest for DevOps MCP Server
apiVersion: devops.v1

project:
  id: github:personal/devops-mcp
  name: devops-mcp
  org: personal
  tier: prod
  kind: app
  owners:
    - verlyn13@example.com

runtime:
  language: node
  miseProfiles:
    - node@24.9
    - bun@1.2

repo:
  url: https://github.com/verlyn13/devops-mcp.git
  defaultBranch: main
  protectedBranches:
    - main
    - release/*
  signedCommitsRequired: true

quality:
  minCoverage: 0.85
  linters:
    - eslint
    - prettier
    - tsc
  licensesAllow:
    - MIT
    - Apache-2.0
    - BSD-3-Clause
  sbom: true

observability:
  slo:
    ciSuccessRate: ">=0.95"
    p95LocalBuildSec: "<=30"
  metrics:
    enableBusiness: false
  alerts:
    channel: "#devops-alerts"

dependencies:
  packageManagers:
    - npm
  updatePolicy: weekly

security:
  secretRefs:
    - secret://gopass/personal/devops-mcp/github-token
    - secret://gopass/personal/devops-mcp/otlp-key
  owaspLevel: L2

dashboard:
  panels:
    - buildHealth
    - coverage
    - deps
    - repoStatus
    - obsLatency
    - sloCompliance