[observers]
dir = "~/Development/personal/system-setup-update/observers"
out_dir = "~/.local/share/devops-mcp/observations"
timeout_ms = 5000

[dashboard_bridge]
enabled = true
port = 7171

[paths]
registry = "~/.local/share/devops-mcp/project-registry.json"

[allow]
commands = ["bash", "sh"]
pathDirs = ["/bin", "/usr/bin", "/usr/local/bin"]

