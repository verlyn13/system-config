version: "1.0"
name: ds-go
description: DS server tools and resources (read-only + streaming)

endpoints:
  base: http://127.0.0.1:7777
  capabilities: /v1/capabilities
  openapi: /openapi.yaml
  sse: /v1/events/stream

resources:
  - id: ds://capabilities
    method: GET
    path: /v1/capabilities
    rate_limit: 60/m

tools:
  - id: ds.task.run
    method: POST
    path: /v1/tasks/run
    schema:
      input:
        type: object
        properties:
          task:
            type: string
          params:
            type: object
        required: [task]
  - id: ds.stream.events
    method: GET
    path: /v1/events/stream
    streaming: sse
    rate_limit: 120/m

security:
  rate_limits:
    default: 120/m
  allowlist:
    hosts: [127.0.0.1]
