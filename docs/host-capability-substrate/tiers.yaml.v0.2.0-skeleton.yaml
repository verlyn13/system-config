tiers:
  read-safe:
    status: activation_candidate
    approval_required: false
    valid_until_ceiling: not_applicable
    activation_notes: no_mutating_grant_path
  write-local:
    status: activation_candidate
    approval_required: false
    valid_until_ceiling: not_applicable
    activation_notes: session_local_execution_context_state_only
  write-project:
    status: activation_candidate
    approval_required_details_ref: operation_class_defaults.worktree_mutation.approval_required_details
    valid_until_ceiling: "PT24H"
    valid_until_ceiling_source_ref: "hcs:docs/host-capability-substrate/adr/0031-q-008-d-worktree-ownership-composition.md"
    activation_notes: project_worktree_mutation_requires_lease_and_grant
  write-destructive:
    status: activation_candidate
    approval_required_details_ref:
      - operation_class_defaults.destructive_git.approval_required_details
      - operation_class_defaults.merge_or_push.approval_required_details
      - operation_class_defaults.external_control_plane_mutation.approval_required_details
    valid_until_ceiling: "PT1H"
    valid_until_ceiling_source_ref: policy_candidate_default_until_class_specific_adr_lands
    activation_notes: hard_to_reverse_external_protected_or_destructive_mutation
  forbidden:
    status: activation_candidate
    approval_required: false
    valid_until_ceiling: not_applicable
    approval_path_allowed: false
    activation_notes: non_escalable_no_grant_path

removed_tiers:
  write-host:
    removed_for_policy_version: "0.1.0"
    reason: no_v0_1_0_operation_class_owns_scoped_host_mutation
    reintroduction_requirement: future_operation_class_with_explicit_approval_dashboard_gates

operation_class_defaults:
  read_only_diagnostic:
    default_tier: read-safe
    primary_classification: typed_operation_class
    approval_required: false
    notes: host_observation_only_gateway_may_reject_stale_sandbox_or_self_asserted_evidence
  agent_internal_state:
    default_tier: write-local
    primary_classification: typed_operation_class
    approval_required: false
    boundary: session_local_execution_context_state_only
    reclassify_when:
      - cross_session_shared_state
      - hcs_runtime_state
      - host_backed_coordination_state
      - host_or_external_side_effects
  workspace_verify:
    default_tier: read-safe
    primary_classification: typed_operation_class
    approval_required: false
    notes: verification_command_shape_only_no_host_mutation
  cleanup_plan:
    default_tier: read-safe
    primary_classification: typed_operation_class
    approval_required: false
    notes: plan_construction_only_execution_remains_separate_and_gated
  worktree_mutation:
    default_tier: write-project
    primary_classification: typed_operation_class
    requires_active_lease: true
    approval_required_details:
      status: required
      required_grant_kind: worktree_clean_acknowledgment
      valid_until_ceiling: "PT24H"
      valid_until_ceiling_source_ref: "hcs:docs/host-capability-substrate/adr/0031-q-008-d-worktree-ownership-composition.md"
      producer_allowlist:
        - mint_api
        - kernel_broker
      dashboard_visibility: required_before_grant_consumption
      evidence_bound_scope: repository_id_workspace_context_id_worktree_path_and_acknowledged_dirty_state_evidence_ref
      single_use: true
      grant_kind_compatibility:
        allowed_grant_kinds:
          - worktree_clean_acknowledgment
  destructive_git:
    default_tier: write-destructive
    primary_classification: typed_operation_class
    requires_deletion_authority: true
    approval_required_details:
      status: required
      required_grant_kind: gate_evidence_acknowledgment
      valid_until_ceiling: "PT1H"
      valid_until_ceiling_source_ref: policy_candidate_default_until_class_specific_adr_lands
      producer_allowlist:
        - mint_api
        - kernel_broker
      dashboard_visibility: required_before_grant_consumption
      evidence_bound_scope: source_ref_target_ref_commit_sha_deletion_authority_and_required_gate_evidence
      single_use: true
      grant_kind_compatibility:
        allowed_grant_kinds:
          - gate_evidence_acknowledgment
          - pr_absence_acknowledgment
  merge_or_push:
    default_tier: write-destructive
    primary_classification: typed_operation_class
    approval_required_details:
      status: required
      required_grant_kind: gate_evidence_acknowledgment
      valid_until_ceiling: "PT1H"
      valid_until_ceiling_source_ref: policy_candidate_default_until_class_specific_adr_lands
      producer_allowlist:
        - mint_api
        - kernel_broker
      dashboard_visibility: required_before_grant_consumption
      evidence_bound_scope: source_ref_target_ref_commit_sha_remote_ref_and_required_gate_evidence
      single_use: true
      grant_kind_compatibility:
        allowed_grant_kinds:
          - gate_evidence_acknowledgment
  external_control_plane_mutation:
    default_tier: write-destructive
    primary_classification: typed_operation_class
    required_pre_execution_evidence:
      invariant_ref: "hcs:docs/host-capability-substrate/implementation-charter.md#invariant-16"
      typed_provider_evidence_required: true
      approval_alone_sufficient: false
      notes: invariant_16_typed_provider_evidence_required_before_any_executable_path
    approval_required_details:
      status: required
      required_grant_kind: gate_evidence_acknowledgment
      valid_until_ceiling: "PT1H"
      valid_until_ceiling_source_ref: policy_candidate_default_until_class_specific_adr_lands
      producer_allowlist:
        - mint_api
        - kernel_broker
      dashboard_visibility: required_before_grant_consumption
      evidence_bound_scope: provider_target_minimal_request_plan_fanout_quota_secret_refs_typed_receipts_and_required_gate_evidence
      single_use: true
      grant_kind_compatibility:
        allowed_grant_kinds:
          - gate_evidence_acknowledgment

lease_kind_rules:
  schema_ref: "hcs:packages/schemas/src/entities/lease.ts#leaseKindSchema"
  worktree:
    lease_kind_status: zod_defined_v0_1_0
    sandbox_acquire: blocked_when_sandbox_not_none
    sandbox_source_field: Session.ExecutionContext.sandbox
    sandbox_rule_source_ref: "hcs:docs/host-capability-substrate/adr/0052-lease-ring-0-entity.md"
    valid_until_ceiling: "PT24H"
    valid_until_ceiling_source_ref: "hcs:docs/host-capability-substrate/adr/0031-q-008-d-worktree-ownership-composition.md"
  reserved_registry_values:
    credential_audience:
      lease_kind_status: not_yet_defined
      source_ref: "hcs:docs/host-capability-substrate/adr/0031-q-008-d-worktree-ownership-composition.md#out-of-scope"
    external_target:
      lease_kind_status: not_yet_defined
      source_ref: "hcs:docs/host-capability-substrate/adr/0031-q-008-d-worktree-ownership-composition.md#out-of-scope"
  future_lease_kinds_require_explicit_sandbox_posture: true

cross_record_rules:
  - rule_id: self_approval_rejection
    left_field: ApprovalGrant.grantor_principal_ref
    operator: must_not_equal_when_operation_class_in_set
    right_field_or_constant: Session.principal_id
    applies_to_operation_classes:
      - destructive_git
      - external_control_plane_mutation
      - worktree_mutation
      - merge_or_push
      - cleanup_plan
    source_ref: "hcs:docs/host-capability-substrate/ontology-registry.md#self-approval-rejection-rule"
    canonicalization_source_ref: "hcs:docs/host-capability-substrate/adr/0054-principal-ring-0-entity.md"
    enforcement_layer_ref: ring_1_mint_api
  - rule_id: producer_disjointness
    left_field: upstream_record.producer_identity
    operator: disjoint_from
    right_field_or_constant: consuming_record.producer_identity
    applies_to_links:
      - decision_to_approval_grant
      - lease_acquire_to_authorizing_decision
      - run_record_to_authorizing_decision
    walk_depth_limit: 64
    cycle_rejection_reason_kind: audit_chain_corruption_detected
    source_ref: "hcs:docs/host-capability-substrate/adr/0049-decision-ring-0-entity.md"
    enforcement_layer_ref: ring_1_mint_api
  - rule_id: force_break
    left_field: Lease.force_break_grant_id
    operator: unavailable_until
    right_field_or_constant: kernel_dashboard_producer_adr
    current_posture: blocked_until_kernel_dashboard_producer_adr
    source_ref: "hcs:docs/host-capability-substrate/adr/0052-lease-ring-0-entity.md"
    enforcement_layer_ref: ring_1_mint_api

external_control_plane_requirements:
  tier_resolution: write-destructive
  invariant_ref: "hcs:docs/host-capability-substrate/implementation-charter.md#invariant-16"
  approval_alone_sufficient: false
  required_pre_execution_evidence:
    typed_provider_evidence_required: true
    minimal_request_plan_required: true
    target_binding_required: true
    fanout_quota_evidence_required: true
    secret_reference_separation_required: true
    typed_receipts_required: true
  required_controls:
    gateway_review_required: true
    approval_grant_consumption_required: true
    broker_fsm_required: true
    dashboard_review_required: true
    audit_required: true
    lease_checks_required: applicable_when_operation_intersects_lease_scope

forbidden_policy:
  canonical_representation: typed_operation_or_capability_family
  approval_path_allowed: false
  reason_kind_strategy: pending_fix_4_reason_kind_path_decision

non_escalable_forbidden_patterns:
  classification_role: renderer_hook_lint_defense_in_depth_only
  primary_classification_allowed: false
  reason: primary_classification_is_typed_operation_class_enum
  patterns:
    - pattern: "\\bsudo\\b"
      reason_kind: operation_class_unregistered
      reason_kind_status: pending_fix_4_reason_kind_path_decision
      notes: no_hidden_sudo_retry_path
    - pattern: "\\bspctl\\s+--master-disable\\b"
      reason_kind: operation_class_unregistered
      reason_kind_status: pending_fix_4_reason_kind_path_decision
      notes: gatekeeper_disable_forbidden_not_approvable
    - pattern: "\\bdefaults\\s+write\\b"
      reason_kind: operation_class_unregistered
      reason_kind_status: pending_fix_4_reason_kind_path_decision
      notes: broad_defaults_mutation_stays_unregistered_until_typed_capability_exists
    - pattern: "\\brm\\s+-[A-Za-z]*[rR][A-Za-z]*[fF]?\\s+/"
      reason_kind: operation_class_unregistered
      reason_kind_status: pending_fix_4_reason_kind_path_decision
      notes: root_recursive_deletion_family_forbidden

