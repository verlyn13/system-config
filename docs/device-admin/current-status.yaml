# system-config device-admin current status
#
# Machine-readable per-device state. Non-secret only.
# Format and packet-state vocabulary: ./handback-format.md
#
# Schema:
#   schema_version            integer, bump on breaking changes
#   last_updated              ISO-8601 UTC timestamp of last write
#   devices[]                 one block per device
#     device                  short identifier (matches doc filenames)
#     owner                   entity that owns the device for admin purposes
#     hostname                local hostname
#     fqdn                    fully-qualified domain name on the admin path
#     ip                      current LAN/private IP on the admin path
#     remote_admin_paths[]    each block has: kind, target, notes
#     current_management_status
#                             short phrase: which packets are applied so far
#     applied_packets[]       name, packet_doc, apply_record, packet_commit,
#                             apply_commit, applied_at
#     prepared_packets[]      name, packet_doc, packet_commit, prepared_at,
#                             approval_phrase_excerpt
#                             (state may be: prepared | approval-required)
#     blocked_items[]         what is blocked and on whose decision
#     approval_required[]     specific live actions the human must approve next
#     next_recommended_action description of the natural next packet, and
#                             the exact approval phrase required
#     last_verified           ISO-8601 UTC timestamp of last live read-only
#                             verification or apply validation
#     latest_system_config_commit
#                             commit short SHA that records the most recent
#                             change for this device's posture

