    blocked_items:
      - item: desktop-2jj3187-service-mode-sshd-kex-reset
        owner: system-config + DSJ-side agent
        notes: >-
          v0.5.0 ssh-lane-install applied cleanly 2026-05-16T02:09:17Z.
          MacBook real-auth probe initially failed: TCP +
          banner exchange complete, client sends SSH_MSG_KEXINIT,
          server resets without sending its own KEXINIT or
          SSH_MSG_DISCONNECT. v0.1.0 diagnostic confirmed
          sshd-process-internal cause (loopback inside DSJ
          reproduces); also confirmed config (sshd -T parses
          cleanly for both source addresses) and host-key ACLs
          (SYSTEM + Administrators FullControl only on every key)
          are correct. OpenSSH/Operational log has only listener-
          start events; no connection-level entries at LogLevel
          INFO.

          Follow-up manual test on 2026-05-16: operator ran
          `Stop-Service sshd` then `C:\Windows\System32\OpenSSH\sshd.exe -d -d -d`
          in foreground. MacBook probe `ssh desktop-2jj3187
          'hostname'` then completed END-TO-END: full KEX
          (curve25519-sha256 + ssh-ed25519), authentication
          (Accepted publickey for jeffr with matching ED25519
          fingerprint SHA256:0oDYmXRFr...+/s), command exec
          (hostname returned DESKTOP-2JJ3187), clean disconnect.
          TOFU prompt answered; host ED25519 key
          SHA256:OFNLsVw4RJlChJef1Db+eelKZnqJfPsVYLkNPVED6V8 now
          in MacBook ~/.ssh/known_hosts.

          BLOCKER IS NARROWED to service-mode-only. SSH
          infrastructure is end-to-end proven correct when sshd
          runs under jeffr's interactive admin token. The failure
          is specific to sshd running under the Windows Service
          Control Manager (default account expected to be
          NT AUTHORITY\SYSTEM). Foreground -ddd log shows
          `debug1: Not running as SYSTEM: skipping loading user
          profile` -- hints that the SYSTEM-context code path
          (user-profile LSA load) is where the failure sits.

          Microsoft uses sshd's own `-y` (network child) and
          `-z` (user child) flags for privsep on this host, not
          sshd-session.exe as earlier hypothesized.

          Next step is simple: `Start-Service sshd` then re-probe
          from MacBook (sshd service is currently stopped after
          the foreground test). If service-mode reset works,
          Phase 3 is done. If KEX reset returns, the standard
          Microsoft recovery is to re-run install-sshd.ps1 to
          reset the service account + permissions. v0.2.0
          diagnostic packet remains drafted as a deeper-
          investigation fallback (binary inventory + Defender +
          WER + foreground -ddd capture, automated). Until
          service-mode is fixed, desktop-2jj3187 remains
          lifecycle_phase: 2 and classification: rdp-only-host,
          BUT the SSH lane is functionally proven and ready to
          flip once service-mode is unblocked.

      - item: desktop-2jj3187-v040-install-superseded-partial-apply
        owner: documented
        notes: >-
          The 2026-05-15 v0.4.0 install attempt halted at S7 because
          Microsoft's default sshd_config has NO Include directive,
          so the v0.4.0 drop-in at
          C:\ProgramData\ssh\sshd_config.d\20-jefahnierocks-admin.conf
          was silently ignored. The S7 effective-config readback
          missed passwordauth_off (and would have missed
          kbdinteractive_off, allow_groups_admin); script halted on
          the first false. v0.4.0 mutated through S6 cleanly
          (capability installed, sshd Running/Automatic, Match block
          confirmed, drop-in written, admin key in
          administrators_authorized_keys, Jefahnierocks SSH LAN TCP
          22 firewall rule active). On-host v0.4.0 evidence dir
          preserved per spec §Packet-Defect Halt Rule. v0.4.0 packet
          markdown carries a SUPERSEDED notice. v0.5.0 adds step
          S3b (Include injection) and inherits v0.4.0's idempotent
          gates so it can resume against the partial-apply state.
          Spec bumped with §Windows OpenSSH Defaults section citing
          Microsoft's upstream sshd_config as the authoritative
          reference. Full postmortem at
          docs/device-admin/desktop-2jj3187-ssh-lane-install-v0.4.0-incident-2026-05-15.md.

      - item: desktop-2jj3187-v030-install-superseded-postmortem
        owner: documented
        notes: >-
          The 2026-05-15 v0.3.0 install attempt halted in S1 with
          "Unexpected OpenSSH.Server state: 0" due to two packet
          defects: (1) em-dashes in the embedded PowerShell strings
          combined with UTF-8-without-BOM encoding caused WinPS 5.1
          to read mojibake and parser-fail on first run, and (2)
          ConvertTo-Json -Compress serialized the
          Microsoft.Dism.Commands.PackageFeatureState enum as integer
          0 which the outer script compared against the string
          'NotPresent' and rejected. Host state did not mutate
          (sshd absent, no firewall rule, no service start, no key
          install). v0.3.0 packet marked status=superseded; preserved
          for postmortem. Spec bumped to v0.5.0 with new sections on
          packet-defect halts, encoding contract, cross-shell data
          normalization, and packet artifact separation
          (docs/ markdown + scripts/device-admin/ .ps1).

