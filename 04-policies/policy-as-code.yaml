# Policy as Code Configuration
# Defines system requirements and compliance standards
# Version: 1.0.0
# Last Updated: September 25, 2025

---
metadata:
  name: "macOS M3 Max Development Environment Policy"
  version: "1.0.0"
  enforcement: "strict"
  validation_frequency: "daily"

# System Requirements Policy
system:
  os:
    name: "macOS"
    min_version: "14.0"  # Sonoma or later
    architecture: "arm64"  # Apple Silicon only

  hardware:
    min_memory_gb: 16
    min_storage_gb: 256
    processor_family: ["M1", "M2", "M3"]

# Directory Structure Policy
directories:
  required:
    - path: "~/Development"
      purpose: "Git repositories"
      permissions: "755"
    - path: "~/workspace"
      purpose: "System management"
      permissions: "755"
    - path: "~/library"
      purpose: "Reference materials"
      permissions: "755"
    - path: "~/archive"
      purpose: "Completed projects"
      permissions: "755"
    - path: "~/00_inbox"
      purpose: "Universal entry point"
      permissions: "755"

  forbidden:
    - "~/Desktop/*"  # Don't create project files here
    - "~/Documents/code"  # Use ~/Development instead
    - "~/tmp"  # Use ~/workspace/tmp instead

# Tool Version Policy
tools:
  required:
    homebrew:
      min_version: "4.0.0"
      install_path: "/opt/homebrew"
      validation: "brew --version"

    chezmoi:
      min_version: "2.0.0"
      config_path: "~/.config/chezmoi/chezmoi.toml"
      validation: "chezmoi --version"

    fish:
      min_version: "3.0.0"
      config_path: "~/.config/fish/"
      validation: "fish --version"
      is_default_shell: true

    mise:
      min_version: "2024.1.0"
      config_path: "~/.config/mise/config.toml"
      validation: "mise --version"

  languages:
    node:
      min_version: "24.0.0"
      manager: "mise"
      validation: "node --version"

    python:
      min_version: "3.13.0"
      manager: "mise"
      validation: "python3 --version"

    go:
      min_version: "1.20.0"
      manager: "mise"
      validation: "go version"

    rust:
      min_version: "1.70.0"
      manager: "mise"
      validation: "rustc --version"

    java:
      version: "temurin-17"
      manager: "mise"
      validation: "java --version"

# PATH Policy
path:
  required_entries:
    - "/opt/homebrew/bin"
    - "/opt/homebrew/sbin"
    - "~/.npm-global/bin"
    - "~/.local/bin"
    - "~/bin"
    - "~/.bun/bin"
    - "~/.local/share/go/workspace/bin"

  order_matters: true
  validation_command: "echo $PATH | tr ':' '\n'"

# Security Policy
security:
  encryption:
    tool: "age"
    key_location: "~/.config/age/key.txt"
    key_permissions: "600"

  secrets_manager:
    tool: "gopass"
    backend: "age"
    store_location: "~/.local/share/gopass/stores/root"

  ssh:
    key_types: ["ed25519", "rsa"]
    min_key_length: 4096
    config_location: "~/.ssh/config"

  forbidden_files:
    - "*.pem"
    - "*.key"
    - ".env"
    - "*_SECRET"
    - "*_TOKEN"
    - "credentials.json"

# Configuration Policy
configuration:
  chezmoi:
    required_keys:
      - "email"
      - "name"
      - "github_user"
      - "headless"
      - "android"
      - "shell"

    template_requirements:
      - "Use default guards for all optional keys"
      - "No hardcoded secrets"
      - "Idempotent run_once scripts"

  fish:
    conf_d_structure:
      - "00-homebrew.fish"
      - "01-mise.fish"
      - "02-direnv.fish"
      - "03-starship.fish"
      - "04-paths.fish"

  mise:
    global_tools:
      - "node"
      - "python"
      - "go"
      - "rust"
      - "bun"
      - "uv"

# Project Structure Policy
projects:
  required_files:
    - ".mise.toml"  # Version management
    - ".envrc"      # Environment variables
    - ".gitignore"  # Git exclusions

  optional_files:
    - "README.md"
    - "LICENSE"
    - "renovate.json"
    - ".github/workflows/"

  naming_convention: "kebab-case"
  location: "~/Development/{github_account}/"

# Compliance Validation
validation:
  commands:
    system_check: "~/bin/validate-system"
    chezmoi_check: "chezmoi doctor"
    mise_check: "mise doctor"
    security_check: "gopass audit"

  schedule:
    daily:
      - "system_check"
      - "chezmoi_check"
    weekly:
      - "mise_check"

# Observability Policy
observability:
  single_source_of_truth: true
  implementation_status_path: "07-reports/status/implementation-status.md"
  overall_status_path: "MASTER-STATUS.md"
  observers:
    allowed: ["repo", "deps", "build", "quality", "sbom"]
    timeouts:
      repo_seconds: 5
      deps_seconds: 30
    allowed_roots:
      - "~/Development/personal"
      - "~/Development/work"
      - "~/Development/business"
      - "~/workspace/projects"
  validation:
    tool: "scripts/validate-observability.sh"
    frequency: "hourly"

# Repository Roles
repositories:
  authoritative:
    name: "system-setup-update"
    description: "Primary, authoritative system configuration + observability repo on this machine."
  legacy:
    patterns: ["system-setup"]
    description: "Legacy import/snapshot. Treat as read-only archive to prevent drift."

  failure_action: "log_and_alert"

# Performance Standards
performance:
  shell_startup_time_ms: 150
  mise_activation_time_ms: 50
  direnv_load_time_ms: 100

  optimization_targets:
    spotlight_exclusions:
      - "~/Development"
      - "~/.gradle"
      - "~/Library/Android"
      - "node_modules"

    time_machine_exclusions:
      - "~/Development"
      - "~/.gradle"
      - "~/Library/Android/sdk"

# Automation Policy
automation:
  ci_cd:
    required: true
    platform: "GitHub Actions"
    checks:
      - "lint"
      - "test"
      - "build"

  dependency_updates:
    tool: "Renovate"
    frequency: "weekly"
    auto_merge: false

  backup:
    dotfiles: "daily"
    projects: "on_commit"

# Exceptions and Overrides
exceptions:
  allowed_overrides:
    - name: "android_development"
      condition: "android = true in chezmoi.toml"
      modifications:
        - "Add Android SDK to PATH"
        - "Install Android Studio"
        - "Configure gradle properties"

    - name: "headless_server"
      condition: "headless = true in chezmoi.toml"
      modifications:
        - "Skip GUI application installation"
        - "Disable desktop-specific optimizations"

    - name: "work_machine"
      condition: "is_work = true in chezmoi.toml"
      modifications:
        - "Add proxy configuration"
        - "Use work GitHub account"
        - "Install corporate tools"

# Enforcement Rules
enforcement:
  levels:
    critical:  # System won't function
      - "Homebrew installation"
      - "Shell configuration"
      - "PATH setup"

    high:  # Security/compliance risk
      - "Secret management"
      - "SSH configuration"
      - "Age key generation"

    medium:  # Productivity impact
      - "Tool versions"
      - "Project templates"
      - "Container setup"

    low:  # Nice to have
      - "System optimizations"
      - "GUI applications"
      - "Custom functions"

  violation_responses:
    critical: "Block operation and require fix"
    high: "Warn and log, fix within 24 hours"
    medium: "Warn and suggest fix"
    low: "Log for weekly review"

# Reporting
reporting:
  metrics:
    - "compliance_percentage"
    - "tool_version_compliance"
    - "security_posture_score"
    - "performance_metrics"

  output_format: "markdown"
  report_location: "docs/reports/compliance-report.md"
  frequency: "weekly"
  optional:
    ds:
      name: "ds-go"
      discovery:
        capabilities: "http://127.0.0.1:7777/v1/capabilities"
        openapi: "http://127.0.0.1:7777/openapi.yaml"
      validation: "ds --version"
      description: "Local DS server/CLI for configuration-approved tasks"
