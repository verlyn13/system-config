# Observer Mappings Configuration
# Maps internal observer names to external contract names

version: v1.1.0
updated: 2025-09-28

mappings:
  # Repository observer -> Git observer (public)
  repo:
    external: git
    description: "Repository operations and git commands"
    boundary: external

  # Dependencies observer -> Mise observer (public)
  deps:
    external: mise
    description: "Dependency management via mise"
    boundary: external

  # Quality observer -> Internal only (never exposed)
  quality:
    external: null
    description: "Internal quality metrics and blocked operations"
    boundary: internal
    never_expose: true

# Valid external observers (public contract)
external_observers:
  - git
  - mise
  - sbom
  - build
  - manifest

# Valid internal observers (implementation details)
internal_observers:
  - repo
  - deps
  - quality
  - git
  - mise
  - sbom
  - build
  - manifest

# Boundary enforcement rules
boundary_rules:
  - name: "Block quality observer at boundaries"
    condition: "observer == 'quality'"
    action: "block"
    reason: "Quality observer is internal only"

  - name: "Map repo to git at boundaries"
    condition: "observer == 'repo'"
    action: "map"
    target: "git"

  - name: "Map deps to mise at boundaries"
    condition: "observer == 'deps'"
    action: "map"
    target: "mise"