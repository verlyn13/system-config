# .chezmoidata.yaml — shared values for managed shell templates
# chezmoi templates reference these as .xdg.config_home, .aliases, etc.

xdg:
  config_home: "$HOME/.config"
  data_home: "$HOME/.local/share"
  state_home: "$HOME/.local/state"
  cache_home: "$HOME/.cache"

paths:
  prepend:
    - "$HOME/.local/bin"
    - "$HOME/.npm-global/bin"
    - "$HOME/.local/share/mise/shims"

homebrew:
  prefix: "/opt/homebrew"

aliases:
  # Safe aliases — don't shadow POSIX commands. Loaded in all modes.
  ll: "ls -lah"
  g: "git"
  dc: "docker compose"

coreutil_aliases:
  # Coreutil replacements — shadow POSIX commands with modern tools.
  # Loaded in interactive mode ONLY. Agents get vanilla coreutils.
  # Rationale: Principle 8 (Fail Fast). Agents expect POSIX semantics.
  cat: "bat --paging=never"
  find: "fd"
  grep: "rg"

workspaces:
  version: 1
  host:
    machine: "workspace-host"
  limits:
    host_cpus: 8
    host_memory: "16GiB"
    default_project_cpus: 2
    default_project_memory: "4GiB"
  projects:
    - slug: "manim"
      path: "/Users/verlyn13/Repos/verlyn13/manim"
      enabled: true
      notes: "Simple workspace-contract proof of concept"
    - slug: "budget-triage"
      path: "/Users/verlyn13/Repos/verlyn13/budget-triage-11-5-2025"
      enabled: false
      notes: "Planned first real workspace-managed infra project"
    - slug: "scopecam-engine"
      path: "/Users/verlyn13/Repos/verlyn13/scopecam-engine"
      enabled: false
      notes: "Enrolled project; no containerized workspace by default"
    - slug: "flux"
      path: "/Users/verlyn13/ai/flux"
      enabled: false
      notes: "Planned first real workspace-managed infra project"

ssh:
  include_glob: "~/.ssh/conf.d/*.conf"
  use_1password_agent: true
  identity_agent: "~/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock"
  host_migrations:
    github_personal: "~/.ssh/id_ed25519_personal.1password.pub"
    github_happy_patterns: "~/.ssh/id_ed25519_happy_patterns.1password.pub"
    runpod_inference: "~/.ssh/runpod-inference.1password.pub"
  defaults:
    server_alive_interval: 30
    server_alive_count_max: 60
    tcp_keep_alive: true
    compression: true
    forward_agent: false
    identities_only: true
    preferred_authentications: "publickey"
    add_keys_to_agent: false
