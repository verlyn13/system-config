# Docker Compose v2 configuration for client generation development
# Uses latest Docker Engine v28.x + Compose v2.39+ patterns

services:
  # Main observability bridge service
  bridge:
    build:
      context: .
      dockerfile: Dockerfile
      # Use BuildKit for enhanced performance
      cache_from:
        - ghcr.io/observability/bridge:cache
    ports:
      - "7171:7171"
    environment:
      - BRIDGE_STRICT=1
      - BRIDGE_CORS=1
      - BRIDGE_AUTO_DISCOVER=1
      - DOCKER_BUILDKIT=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7171/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    # Modern volume syntax
    volumes:
      - type: bind
        source: ./schema
        target: /app/schema
        read_only: true
    networks:
      - obs-network

  # Client generator service using latest OpenAPI tools
  client-generator:
    image: openapitools/openapi-generator-cli:latest
    # Use bind mounts with type specification (2025 pattern)
    volumes:
      - type: bind
        source: ./generated
        target: /local/generated
    # Use depends_on with healthcheck condition
    depends_on:
      bridge:
        condition: service_healthy
    # Modern environment syntax
    environment:
      BRIDGE_URL: http://bridge:7171
    # Use profiles for selective service startup
    profiles:
      - tools
    networks:
      - obs-network

  # Watch mode for development (Compose v2.39+ feature)
  bridge-dev:
    extends:
      service: bridge
    # Use watch for live reload (Compose v2.22+)
    develop:
      watch:
        - action: sync
          path: ./scripts
          target: /app/scripts
        - action: sync
          path: ./schema
          target: /app/schema
        - action: rebuild
          path: ./package.json
    profiles:
      - dev

# Modern network configuration
networks:
  obs-network:
    driver: bridge
    # Use explicit interface naming (v2.38+)
    driver_opts:
      com.docker.network.bridge.name: obs-bridge

# Volumes with proper specifications
volumes:
  generated:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./generated

# Include additional compose files (v2.20+)
include:
  - path: docker-compose.override.yml
    required: false