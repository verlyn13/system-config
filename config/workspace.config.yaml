# Workspace Configuration
# This is the source of truth for all workspace definitions
# Used by: MCP Server, Dashboard, Observers, DS CLI

apiVersion: workspace.v2
kind: WorkspaceConfig

workspaces:
  personal:
    root: ~/Development/personal
    profile: personal
    github: verlyn13
    tier: production
    discovery:
      enabled: true
      depth: 3
      patterns:
        - "*/project.manifest.yaml"
        - "*/.git"
      exclude:
        - "*/node_modules"
        - "*/.cache"
        - "*/target"
        - "*/dist"
    toolchains:
      mise:
        profiles:
          - personal
        autoInstall: true
      ds:
        context: personal
        server: http://127.0.0.1:7777
    observability:
      observers:
        - repo
        - deps
        - build
        - quality
      schedule: "0 * * * *"  # Hourly
    security:
      secretsProvider: gopass
      keyringPath: personal/
      requireSigning: false

  work:
    root: ~/Development/work
    profile: work
    github: jjohnson-47
    tier: production
    discovery:
      enabled: true
      depth: 3
      exclude:
        - "*/node_modules"
        - "*/.venv"
    toolchains:
      mise:
        profiles:
          - work
        autoInstall: true
      ds:
        context: work
        server: http://127.0.0.1:7778
    observability:
      observers:
        - repo
        - deps
        - build
        - quality
        - security
      schedule: "0 * * * *"
    security:
      secretsProvider: gopass
      keyringPath: work/
      requireSigning: true

  business:
    root: ~/Development/business
    profile: business
    github: happy-patterns
    tier: production
    discovery:
      enabled: true
      depth: 3
    toolchains:
      mise:
        profiles:
          - business
      ds:
        context: business
        server: http://127.0.0.1:7779
    observability:
      observers:
        - repo
        - deps
      schedule: "0 */2 * * *"  # Every 2 hours
    security:
      secretsProvider: gopass
      keyringPath: business/

  business-org:
    root: ~/Development/business-org
    profile: business-org
    github: happy-patterns-org
    tier: production
    discovery:
      enabled: true
      depth: 3
    toolchains:
      mise:
        profiles:
          - business
    security:
      secretsProvider: gopass
      keyringPath: business/

  hubofwyn:
    root: ~/Development/hubofwyn
    profile: hubofwyn
    github: hubofwyn
    tier: staging
    discovery:
      enabled: true
      depth: 2
    toolchains:
      mise:
        profiles:
          - personal
    security:
      secretsProvider: gopass
      keyringPath: personal/

  experiments:
    root: ~/workspace/experiments
    profile: sandbox
    tier: development
    discovery:
      enabled: false  # Manual registration only
    toolchains:
      mise:
        profiles:
          - sandbox
      ds:
        context: sandbox
    observability:
      observers:
        - repo
      schedule: "0 0 * * 0"  # Weekly
    security:
      secretsProvider: gopass
      keyringPath: sandbox/
      requireSigning: false

defaults:
  discoveryDepth: 3
  autoRegister: true
  validateManifests: true
  requireSigning: false
  toolVersions:
    git: ">=2.40"
    mise: ">=2025.9"
    node: ">=22"
    python: ">=3.11"

policies:
  maxProjectsPerWorkspace: 100
  requireManifest: false
  requireGit: true
  allowedTiers:
    - production
    - staging
    - development
    - archive
  forbiddenPaths:
    - "~/"
    - "~/Desktop"
    - "~/Documents"
    - "~/Downloads"
  toolchains:
    required:
      - git
      - mise
    recommended:
      - ds
      - docker
    optional:
      - kubectl
      - helm

hooks:
  preDiscovery: scripts/workspace-pre-discover.sh
  postDiscovery: scripts/workspace-post-discover.sh
  preValidation: scripts/workspace-pre-validate.sh
  onError: scripts/workspace-error-handler.sh

telemetry:
  enabled: true
  endpoint: http://localhost:4317
  attributes:
    - workspace
    - tier
    - profile
  metrics:
    - project_count
    - health_score
    - discovery_latency
    - validation_errors