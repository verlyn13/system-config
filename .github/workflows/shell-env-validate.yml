name: Shell Env Validate

on:
  push:
  pull_request:

jobs:
  envrc-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate .envrc structure
        run: |
          test -f .envrc
          grep -q 'use_mise()' .envrc
          grep -q 'direnv_load mise direnv exec' .envrc
          grep -q '^use mise' .envrc || grep -q '\\nuse mise' .envrc
          ! grep -q '\$(mise direnv)' .envrc
      - name: Report success
        run: echo ".envrc structure looks good"

  direnv-basic-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install direnv
        run: |
          sudo apt-get update
          sudo apt-get install -y direnv bash
      - name: Configure direnv to use /usr/bin/bash
        run: |
          mkdir -p $HOME/.config/direnv
          echo 'bash_path = "/usr/bin/bash"' > $HOME/.config/direnv/direnv.toml
      - name: Sanity test direnv export with empty .envrc
        run: |
          tmp=$(mktemp -d)
          : > "$tmp/.envrc"
          direnv allow "$tmp"
          (cd "$tmp" && direnv export bash)
      - name: Sanity test direnv stdlib
        run: direnv stdlib | head -n 20

