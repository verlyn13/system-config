name: Stage 3 — SSE Smoke

on:
  workflow_dispatch:

jobs:
  sse-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Start Bridge
        env:
          BRIDGE_CORS: '1'
          BRIDGE_STRICT: '1'
        run: |
          nohup node scripts/http-bridge.js > bridge.log 2>&1 &
          for i in {1..30}; do curl -sf http://127.0.0.1:7171/api/health && break || sleep 1; done
      - name: Prepare tools
        run: |
          node -v
      - name: Ensure at least one project exists (discover if needed)
        run: |
          curl -sf http://127.0.0.1:7171/api/discover || true
          curl -sf http://127.0.0.1:7171/api/projects | jq '.count'
      - name: Trigger a fast observer to create an observation line
        run: |
          PID=$(curl -sf http://127.0.0.1:7171/api/projects | jq -r '.projects[0].id')
          echo "PID=$PID"
          curl -sf -X POST http://127.0.0.1:7171/api/tools/project_obs_run \
            -H 'Content-Type: application/json' \
            -d "{\"project_id\":\"$PID\",\"observer\":\"manifest\"}"
      - name: Run SSE schema validation (short timeout)
        env:
          OBS_BRIDGE_URL: http://127.0.0.1:7171
          SSE_VALIDATE_TIMEOUT_MS: '6000'
          SSE_TRIGGER_OBSERVER: '1'
        run: |
          node scripts/sse-validate.mjs
      - name: Show Bridge Logs (on failure)
        if: failure()
        run: |
          echo '--- bridge.log ---'
          tail -n 300 bridge.log || true
