name: System Validation

on:
  # Run on push to any branch
  push:
    paths:
      - '01-setup/**'
      - '02-configuration/**'
      - '04-policies/**'
      - '03-automation/scripts/**'
      - '.github/workflows/validation.yml'

  # Run on pull requests
  pull_request:

  # Manual trigger
  workflow_dispatch:

jobs:
  validate-structure:
    name: Validate Repository Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check directory structure
        run: |
          echo "## 📁 Repository Structure Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check required directories
          required_dirs=(
            "01-setup"
            "02-configuration"
            "03-automation"
            "04-policies"
            "05-reference"
            "06-templates"
            "07-reports"
            ".meta"
          )

          missing_dirs=()
          for dir in "${required_dirs[@]}"; do
            if [ -d "$dir" ]; then
              echo "✅ Directory exists: $dir" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Missing directory: $dir" >> $GITHUB_STEP_SUMMARY
              missing_dirs+=("$dir")
            fi
          done

          if [ ${#missing_dirs[@]} -gt 0 ]; then
            echo "::error::Missing required directories: ${missing_dirs[*]}"
            exit 1
          fi

      - name: Validate documentation metadata
        run: |
          python -c "
          import os
          import re
          from pathlib import Path

          errors = []
          warnings = []
          valid_count = 0

          for md_file in Path('.').rglob('*.md'):
              content = md_file.read_text()

              # Check for frontmatter
              if not content.startswith('---'):
                  warnings.append(f'{md_file}: Missing frontmatter')
                  continue

              # Extract frontmatter
              end_marker = content.find('\\n---\\n', 4)
              if end_marker == -1:
                  errors.append(f'{md_file}: Invalid frontmatter format')
                  continue

              frontmatter = content[4:end_marker]

              # Check required fields
              required_fields = ['title', 'category', 'status', 'version', 'last_updated']
              for field in required_fields:
                  if field not in frontmatter:
                      errors.append(f'{md_file}: Missing required field: {field}')

              valid_count += 1

          print(f'✅ Valid documents: {valid_count}')
          print(f'⚠️  Warnings: {len(warnings)}')
          print(f'❌ Errors: {len(errors)}')

          if errors:
              for error in errors[:10]:  # Show first 10 errors
                  print(f'  - {error}')
              exit(1)
          "

  validate-policies:
    name: Validate Policies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml jsonschema

      - name: Validate policy files
        run: |
          python -c "
          import yaml
          import json
          from pathlib import Path

          # Check policy-as-code.yaml
          policy_file = Path('04-policies/policy-as-code.yaml')
          if policy_file.exists():
              try:
                  with open(policy_file) as f:
                      policies = yaml.safe_load(f)
                  print(f'✅ Policy file is valid YAML')
                  print(f'📋 Found {len(policies)} policy categories')
              except yaml.YAMLError as e:
                  print(f'❌ Invalid YAML in policy file: {e}')
                  exit(1)
          else:
              print('⚠️  Policy file not found')
          "

  validate-scripts:
    name: Validate Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check shell scripts
        run: |
          # Find all shell scripts
          find . -type f -name "*.sh" -print0 | while IFS= read -r -d '' script; do
            echo "Checking: $script"
            # Check syntax (bash -n doesn't execute, just checks syntax)
            if bash -n "$script"; then
              echo "✅ $script: Syntax OK"
            else
              echo "❌ $script: Syntax error"
              exit 1
            fi
          done

      - name: Check Python scripts
        run: |
          # Find all Python scripts
          find . -type f -name "*.py" -print0 | while IFS= read -r -d '' script; do
            echo "Checking: $script"
            # Check syntax
            if python -m py_compile "$script"; then
              echo "✅ $script: Syntax OK"
            else
              echo "❌ $script: Syntax error"
              exit 1
            fi
          done

      - name: Check script permissions
        run: |
          # Check that scripts in 03-automation/scripts are executable
          for script in 03-automation/scripts/*; do
            if [ -f "$script" ]; then
              if [ -x "$script" ]; then
                echo "✅ $script is executable"
              else
                echo "⚠️  $script is not executable"
              fi
            fi
          done

  validate-links:
    name: Validate Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,301,302
            --timeout 20
            --max-retries 3
            --exclude-mail
            './**/*.md'
          fail: false  # Don't fail on broken links, just report

      - name: Upload link check results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-check-results
          path: ./lychee.out

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-structure, validate-policies, validate-scripts, validate-links]
    if: always()

    steps:
      - name: Create summary
        run: |
          echo "## 🔍 Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Repository Structure | ${{ needs.validate-structure.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Policies | ${{ needs.validate-policies.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scripts | ${{ needs.validate-scripts.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Links | ${{ needs.validate-links.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Determine overall status
          if [[ "${{ needs.validate-structure.result }}" == "failure" ]] || \
             [[ "${{ needs.validate-policies.result }}" == "failure" ]] || \
             [[ "${{ needs.validate-scripts.result }}" == "failure" ]]; then
            echo "**Overall Result**: ❌ Failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "**Overall Result**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          fi