name: Validate Endpoints
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Start Bridge
        run: |
          nohup node scripts/http-bridge.js > bridge.log 2>&1 &
          for i in {1..30}; do curl -sf http://127.0.0.1:7171/api/health && break || sleep 1; done
      - name: Install dependencies
        run: |
          npm install ajv@^8.17.1
          npm install ajv-formats@^3.0.1
      - name: Validate Discovery and Endpoints (Smoke Test)
        run: |
          # Test basic health
          curl -sf http://127.0.0.1:7171/api/health | jq '.ok'
          # Test discovery endpoints
          curl -sf http://127.0.0.1:7171/api/discovery/services | jq 'keys'
          # Test OpenAPI served
          curl -sfI http://127.0.0.1:7171/openapi.yaml | head -n 1
          # Test OpenAPI $ref schema alias
          curl -sfI http://127.0.0.1:7171/schema/obs.integration.v1.json | head -n 1
          # Test well-known endpoints
          curl -sf http://127.0.0.1:7171/.well-known/obs-bridge.json | jq '.contractVersion'
          curl -sf http://127.0.0.1:7171/api/obs/well-known | jq '.contractVersion'
          # Test tools endpoints
          curl -sf -X POST http://127.0.0.1:7171/api/tools/obs_validate | jq '.ok'
          # Test obs_migrate (critical)
          echo '{}' | curl -sf -X POST http://127.0.0.1:7171/api/tools/obs_migrate -H "Content-Type: application/json" -d @- | jq '.ok'
      - name: Validate Endpoints with Typed Schema Validation
        run: |
          echo "Running typed endpoint validation..."
          node scripts/validate-endpoints.js
      - name: SSE Smoke Validation (optional)
        if: env.SSE_SMOKE == '1'
        env:
          OBS_BRIDGE_URL: http://127.0.0.1:7171
        run: |
          echo "Running SSE validation..."
          node scripts/sse-validate.mjs
      - name: Show Bridge Logs (on failure)
        if: failure()
        run: |
          echo '--- bridge.log ---'
          tail -n 200 bridge.log || true
