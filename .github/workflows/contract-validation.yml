name: Contract Validation
# Stage 1 Contract Freeze - v1.1.0
# Enforces contract compliance on all PRs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'openapi.yaml'
      - 'schema/*.json'
      - 'contracts/**'
      - '.redocly.yaml'
      - 'scripts/validate-schemas.js'
      - '.github/workflows/contract-validation.yml'

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install ajv@^8.17.1
          npm install ajv-formats@^3.0.1

      - name: Validate schemas
        run: node scripts/validate-schemas.js

      - name: Check schema structure
        run: |
          echo "Checking required schema fields..."
          for file in schema/*.json; do
            echo "Checking $file"
            # Check for required fields
            jq -e '.$schema' "$file" > /dev/null || (echo "❌ Missing \$schema in $file" && exit 1)
            jq -e '.$id' "$file" > /dev/null || (echo "❌ Missing \$id in $file" && exit 1)
            jq -e '.title' "$file" > /dev/null || (echo "❌ Missing title in $file" && exit 1)
            jq -e '.description' "$file" > /dev/null || (echo "❌ Missing description in $file" && exit 1)
          done
          echo "✅ All schemas have required fields"

  validate-openapi:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli@latest

      - name: Lint OpenAPI spec
        run: |
          echo "Linting OpenAPI specification..."
          npx redocly lint openapi.yaml

      - name: Validate OpenAPI structure
        run: |
          echo "Validating OpenAPI structure..."
          # Check for required sections
          yq eval '.openapi' openapi.yaml > /dev/null || (echo "❌ Missing openapi version" && exit 1)
          yq eval '.info.version' openapi.yaml > /dev/null || (echo "❌ Missing info.version" && exit 1)
          yq eval '.servers' openapi.yaml > /dev/null || (echo "❌ Missing servers" && exit 1)
          yq eval '.paths' openapi.yaml > /dev/null || (echo "❌ Missing paths" && exit 1)
          echo "✅ OpenAPI structure valid"

  check-contract-version:
    name: Check Contract Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify contract version
        run: |
          VERSION=$(cat contracts/VERSION 2>/dev/null || echo "missing")
          echo "Contract version: $VERSION"

          if [ "$VERSION" != "v1.1.0" ]; then
            echo "❌ Contract version mismatch!"
            echo "Expected: v1.1.0"
            echo "Found: $VERSION"
            exit 1
          fi

          echo "✅ Contract version correct"

      - name: Check CHANGELOG
        run: |
          if [ ! -f "contracts/CHANGELOG.md" ]; then
            echo "❌ contracts/CHANGELOG.md not found"
            exit 1
          fi

          # Check for frozen status
          if ! grep -q "Contract Status.*FROZEN" contracts/CHANGELOG.md; then
            echo "❌ Contract not marked as FROZEN in CHANGELOG"
            exit 1
          fi

          echo "✅ Contract CHANGELOG present and frozen"

  validate-backwards-compat:
    name: Validate Backwards Compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for breaking changes
        run: |
          echo "Checking for breaking changes in OpenAPI..."

          # Get the base branch OpenAPI
          git show origin/${{ github.base_ref }}:openapi.yaml > /tmp/openapi-base.yaml 2>/dev/null || true

          if [ -f /tmp/openapi-base.yaml ]; then
            # Install oasdiff for breaking change detection
            npm install -g oasdiff

            # Check for breaking changes
            npx oasdiff breaking /tmp/openapi-base.yaml openapi.yaml || {
              echo "⚠️ Breaking changes detected!"
              echo "Breaking changes require a major version bump (v2.0.0)"
              exit 1
            }

            echo "✅ No breaking changes detected"
          else
            echo "⚠️ Base OpenAPI not found, skipping breaking change check"
          fi

  validate-aliases:
    name: Validate Alias Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check alias routes in OpenAPI
        run: |
          echo "Checking alias parity in OpenAPI..."

          # For each primary route, check if alias exists
          PRIMARY_ROUTES=$(yq eval '.paths | keys | .[] | select(. | test("^/api/(?!obs/)"))'  openapi.yaml)

          for route in $PRIMARY_ROUTES; do
            # Skip certain routes that don't need aliases
            if echo "$route" | grep -qE "/(health|telemetry-info|events/stream)"; then
              continue
            fi

            # Construct expected alias
            ALIAS="/api/obs${route#/api}"

            # Check if alias exists
            if ! yq eval ".paths[\"$ALIAS\"]" openapi.yaml > /dev/null 2>&1; then
              echo "❌ Missing alias for $route -> $ALIAS"
              exit 1
            fi
          done

          echo "✅ All required aliases present"

  summary:
    name: Contract Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-schemas, validate-openapi, check-contract-version, validate-aliases]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Contract Validation Summary"
          echo ""
          echo "Contract Version: v1.1.0"
          echo "Status: FROZEN"
          echo ""
          echo "### Validation Results"
          echo "- Schemas: ${{ needs.validate-schemas.result }}"
          echo "- OpenAPI: ${{ needs.validate-openapi.result }}"
          echo "- Version: ${{ needs.check-contract-version.result }}"
          echo "- Aliases: ${{ needs.validate-aliases.result }}"
          echo ""

          if [ "${{ needs.validate-schemas.result }}" == "success" ] && \
             [ "${{ needs.validate-openapi.result }}" == "success" ] && \
             [ "${{ needs.check-contract-version.result }}" == "success" ] && \
             [ "${{ needs.validate-aliases.result }}" == "success" ]; then
            echo "✅ **All contract validations passed**"
          else
            echo "❌ **Contract validation failed**"
            exit 1
          fi