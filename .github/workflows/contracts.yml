name: Contracts Validation
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Spectral Lint (OAS)
        run: |
          npm i -g @stoplight/spectral-cli
          spectral lint openapi.yaml -r spectral:oas
      - name: Bundle OpenAPI (Redocly)
        run: |
          npm i -g @redocly/cli
          redocly bundle openapi.yaml --dereferenced -o build/openapi.bundled.yaml
      - name: Validate JSON Schemas (ajv-cli)
        run: |
          npm i -g ajv-cli@5
          # Core observation schemas
          ajv validate -s schema/obs.line.v1.json --strict=true
          ajv validate -s schema/obs.health.v1.json --strict=true
          ajv validate -s schema/obs.slobreach.v1.json --strict=true
          # Integration and tool result schemas (critical for Stage 1)
          ajv validate -s schema/obs.integration.v1.json --strict=true
          ajv validate -s schema/obs.validate.result.v1.json --strict=true
          ajv validate -s schema/obs.migrate.result.v1.json --strict=true
          ajv validate -s schema/service.discovery.v1.json --strict=true
          # Manifest and project schemas
          ajv validate -s schema/obs.manifest.result.v1.json --strict=true
          ajv validate -s schema/project.manifest.schema.json --strict=false
          ajv validate -s schema/project.manifest.v1.json --strict=true
          # Additional schemas for completeness
          ajv validate -s schema/observer.output.schema.json --strict=false
          ajv validate -s schema/project-integration.schema.json --strict=false
          ajv validate -s schema/workspace.config.schema.json --strict=false
      - name: Lint OpenAPI (Redocly)
        run: |
          redocly lint openapi.yaml
      - name: OPA/Conftest registry check
        run: |
          sudo curl -L -o /usr/local/bin/conftest https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz || true
          if [ -f /usr/local/bin/conftest ]; then chmod +x /usr/local/bin/conftest; fi
          sudo apt-get update && sudo apt-get install -y jq curl >/dev/null 2>&1 || true
          # Use example registry if user registry not present
          conftest test -p 04-policies/opa docs/system-registry.example.yaml || echo "Conftest not available, skip"
      - name: oasdiff (breaking changes)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          npm i -g oasdiff
          # If previous reference not present, skip breaking check
          if [ -f contracts/refs/openapi.prev.yaml ]; then oasdiff breaking contracts/refs/openapi.prev.yaml openapi.yaml; else echo "No previous openapi ref"; fi
