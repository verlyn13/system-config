name: Documentation Sync

on:
  # Run on push to main branch
  push:
    branches: [main]
    paths:
      - '**.md'
      - '03-automation/scripts/**'
      - '.github/workflows/documentation-sync.yml'

  # Run on pull requests
  pull_request:
    branches: [main]

  # Scheduled runs
  schedule:
    # Run daily at 2 AM UTC (7 PM PST)
    - cron: '0 2 * * *'

  # Manual trigger
  workflow_dispatch:
    inputs:
      sync_type:
        description: 'Type of sync to perform'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - docs-only
          - validation-only

jobs:
  validate:
    name: Validate System Documentation
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better sync

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Install Homebrew (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v brew &> /dev/null; then
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi

      - name: Install tools via Homebrew
        if: runner.os == 'macOS'
        run: |
          brew install chezmoi mise

      - name: Run documentation validation
        run: |
          python 03-automation/scripts/validate-system.py || true

      - name: Check documentation metadata
        run: |
          python 03-automation/scripts/add-frontmatter.py

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: 07-reports/status/validation-results.json

  sync:
    name: Synchronize Documentation
    runs-on: macos-latest
    needs: validate
    if: github.event_name != 'pull_request'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Run documentation sync
        run: |
          python 03-automation/scripts/doc-sync-engine.py

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            docs: automated documentation sync

            - Updated system status reports
            - Synchronized configuration state
            - Refreshed tool versions
            - Updated compliance reports

            🤖 Generated by Documentation Sync workflow
          branch: docs/automated-sync-${{ github.run_number }}
          delete-branch: true
          title: '📚 Documentation Sync - ${{ github.run_number }}'
          body: |
            ## 🤖 Automated Documentation Sync

            This PR was automatically generated by the Documentation Sync workflow.

            ### Changes
            - Updated system status reports
            - Synchronized configuration documentation
            - Refreshed tool version information
            - Updated compliance and validation reports

            ### Validation Results
            See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for detailed validation results.

            ### Review Checklist
            - [ ] Review updated status reports
            - [ ] Check for any new discrepancies
            - [ ] Verify tool versions are accurate
            - [ ] Ensure no sensitive information is exposed

            ---
            *Generated at: ${{ github.event.head_commit.timestamp }}*
          labels: |
            documentation
            automated
            sync

  lint:
    name: Lint Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules/**
            !.git/**

      - name: Check YAML files
        run: |
          python -m pip install --upgrade pip
          pip install yamllint
          yamllint -d relaxed .

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy security scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  notify:
    name: Notify on Completion
    runs-on: ubuntu-latest
    needs: [validate, sync, lint, security]
    if: always()

    steps:
      - name: Check workflow status
        id: check_status
        run: |
          if [[ "${{ needs.validate.result }}" == "failure" ]] || \
             [[ "${{ needs.sync.result }}" == "failure" ]] || \
             [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.security.result }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Create workflow summary
        run: |
          echo "## 📊 Documentation Sync Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sync | ${{ needs.sync.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status**: ${{ steps.check_status.outputs.status }}" >> $GITHUB_STEP_SUMMARY