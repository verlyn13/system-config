# Repository settings managed by Probot: Settings
# https://probot.github.io/apps/settings/

repository:
  name: system-setup-update
  description: "macOS 26.0 development environment orchestration with contracts, observability, and multi-repo management"
  homepage: ""
  topics:
    - macos
    - development-environment
    - devops
    - mise
    - chezmoi
    - observability
    - contracts
    - automation
  private: false
  has_issues: true
  has_projects: true
  has_wiki: false
  has_downloads: true
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  allow_auto_merge: true
  delete_branch_on_merge: true
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true

# Labels for issue and PR management
labels:
  - name: "stage-0"
    color: "0052cc"
    description: "Foundation setup and discovery"
  - name: "stage-1"
    color: "1d76db"
    description: "Contract freeze and CI gates"
  - name: "stage-2"
    color: "5ebeff"
    description: "Client generation and drift prevention"
  - name: "stage-3"
    color: "fbca04"
    description: "SSE and observers implementation"
  - name: "stage-4"
    color: "0e8a16"
    description: "UX and prefetch optimization"
  - name: "breaking-change"
    color: "d73a49"
    description: "Changes that break backward compatibility"
  - name: "contract-change"
    color: "f9d0c4"
    description: "Modifications to API contracts"
  - name: "automation"
    color: "7057ff"
    description: "CI/CD, scripting, and workflow improvements"
  - name: "environment"
    color: "006b75"
    description: "Development environment configuration"
  - name: "observability"
    color: "e99695"
    description: "Monitoring, logging, and telemetry"

# Branch protection rules
branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        contexts:
          - "Validate JSON Schemas"
          - "Lint OpenAPI"
          - "System Validation"
          - "Convention Checks"
          - "Contract Validation"
      enforce_admins: false
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        bypass_pull_request_allowances:
          users: []
          teams: []
      restrictions: null
      allow_force_pushes: false
      allow_deletions: false

# Environment protection rules
environments:
  - name: staging
    protection_rules:
      - type: wait_timer
        wait_timer: 5
    deployment_branch_policy:
      protected_branches: true
      custom_branch_policies: false
  - name: production
    protection_rules:
      - type: required_reviewers
        reviewers:
          - verlyn13
    deployment_branch_policy:
      protected_branches: true
      custom_branch_policies: false